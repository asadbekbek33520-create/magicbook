<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic CRM | Управление бронированием</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="app-container">
        <header class="main-header">
            <div class="logo-section">
                <span class="logo-icon">🏰</span>
                <h1>Magic<span>CRM</span></h1>
            </div>
            <div class="park-selector">
                <button class="park-btn active" onclick="changePark('Magic City', this)">Magic City</button>
                <button class="park-btn" onclick="changePark('Magic Safari', this)">Magic Safari</button>
            </div>
        </header>

        <div class="table-card">
            <div class="table-responsive">
                <table id="bookingTable">
                    <thead>
                        <tr>
                            </tr>
                    </thead>
                    <tbody id="tableBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="closeModal()"></div>

    <div class="modal" id="bookingModal">
        <div class="modal-header">
            <h3 id="modalTitle">Детали бронирования</h3>
            <button class="close-btn" onclick="closeModal()">&times;</button>
        </div>
        
        <div class="modal-body">
            <div class="form-row">
                <div class="input-group">
                    <label>Время прибытия</label>
                    <input type="time" id="time" class="modern-input">
                </div>
            </div>
            
            <div class="input-group">
                <label>Название организации / Имя</label>
                <input type="text" id="company" placeholder="Например: Школа №21 или Иван Иванов" class="modern-input">
            </div>

            <div class="input-group">
                <label>Локация (Объект)</label>
                <select id="objSelect" class="modern-select">
                    </select>
            </div>
            
            <div class="two-cols">
                <div class="input-group">
                    <label>Кол-во гостей</label>
                    <input type="number" id="visitors" placeholder="0" class="modern-input">
                </div>
                <div class="input-group">
                    <label>Сопровождающие</label>
                    <input type="number" id="guides" placeholder="0" class="modern-input">
                </div>
            </div>

            <div class="input-group">
                <label>Контактные данные</label>
                <input type="text" id="contact" placeholder="Телефон или @username" class="modern-input">
            </div>
